<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkSniper - AI Link Bypass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container">
    <header class="hero">
      <div class="logo">
        <img src="/logos.png" alt="LinkSniper" class="logo-icon" width="48" height="48">
        <span class="logo-text">LinkSniper</span>
      </div>
      <p class="hero-sub">Bypass semua shortlink dalam satu klik</p>
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-num" id="statServices">12+</span>
          <span class="stat-label">Services</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="statSpeed">1.8s</span>
          <span class="stat-label">Avg Speed</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="statSuccess">98%</span>
          <span class="stat-label">Success</span>
        </div>
      </div>
    </header>

    <main>
      <div class="input-card">
        <div class="input-wrapper">
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
          </div>
          <input type="url" id="urlInput" placeholder="Paste link shortlink di sini..." autofocus>
          <button id="resolveBtn" onclick="resolve()">
            <span class="btn-text">Bypass</span>
            <span class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
              </svg>
            </span>
          </button>
        </div>
        <div class="detected-badge hidden" id="detectedBadge">
          <span class="badge-dot"></span>
          <span id="detectedName"></span>
        </div>
      </div>

      <div class="mode-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        Organic Mode
      </div>

      <div id="status" class="status hidden"></div>

      <div id="progress" class="progress hidden">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-steps" id="progressSteps"></div>
      </div>

      <div id="result" class="result-card hidden">
        <div class="result-top">
          <div class="result-badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
            <span>URL Ditemukan</span>
          </div>
          <button class="copy-btn" onclick="copyResult()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
        <div class="result-url" id="finalUrl"></div>
        <div class="result-tags" id="resultTags"></div>
      </div>

      <div id="logs" class="logs-card hidden">
        <div class="logs-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
          <span>Proses Bypass</span>
          <span class="logs-time" id="logsTime"></span>
        </div>
        <div class="logs-body" id="logSteps"></div>
      </div>
    </main>

    <footer>
      <div class="footer-buttons">
        <a href="https://sociabuzz.com/manusiawhy/tribe" target="_blank" class="footer-btn btn-jajan">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Kasih Uang Jajan
        </a>
        <a href="https://www.instagram.com/manusiawhy" target="_blank" class="footer-btn btn-ig">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
          Instagram
        </a>
      </div>
      <p class="credit">Created by Manusiawhy</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
