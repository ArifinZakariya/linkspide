<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortlink Bypass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .result.show { display: block; }
        .result a {
            color: #667eea;
            word-break: break-all;
            text-decoration: none;
            font-weight: 500;
        }
        .result a:hover { text-decoration: underline; }
        .error { color: #e74c3c; }
        .loading {
            text-align: center;
            color: #666;
            margin-top: 1rem;
            display: none;
        }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shortlink Bypass</h1>
        <div class="input-group">
            <input type="text" id="url" placeholder="Paste shrinkme.click URL here...">
            <button onclick="bypass()">Bypass</button>
        </div>
        <div class="loading" id="loading">Processing... please wait (12 seconds)</div>
        <div class="result" id="result">
            <strong>Destination URL:</strong><br>
            <a id="destUrl" href="#" target="_blank"></a>
        </div>
    </div>

    <script>
        async function bypass() {
            const url = document.getElementById('url').value.trim();
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const destUrl = document.getElementById('destUrl');
            const btn = document.querySelector('button');

            if (!url) {
                alert('Please enter a URL');
                return;
            }

            loading.classList.add('show');
            result.classList.remove('show');
            btn.disabled = true;

            try {
                const resp = await fetch(`/api/bypass?url=${encodeURIComponent(url)}`);
                const data = await resp.json();

                if (data.success) {
                    destUrl.href = data.destination;
                    destUrl.textContent = data.destination;
                    result.classList.add('show');
                } else {
                    destUrl.textContent = data.error || 'Failed';
                    destUrl.style.color = '#e74c3c';
                    result.classList.add('show');
                }
            } catch (e) {
                destUrl.textContent = 'Error: ' + e.message;
                destUrl.style.color = '#e74c3c';
                result.classList.add('show');
            }

            loading.classList.remove('show');
            btn.disabled = false;
        }

        document.getElementById('url').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') bypass();
        });
    </script>
</body>
</html>
