# fly.toml app configuration file generated for shortlink-video-service on 2026-06-14T11:46:04+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shortlink-video-service'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3002'

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
